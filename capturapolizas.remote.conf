<VirtualHost *:80>
    ServerName capturapolizas.clickseguros.lat
    Redirect permanent / https://capturapolizas.clickseguros.lat/
</VirtualHost>

<VirtualHost *:443>
    ServerName capturapolizas.clickseguros.lat
    DocumentRoot /var/www/html/portal-captura-polizas
    ErrorLog /var/log/apache2/capturapolizas_error.log
    CustomLog /var/log/apache2/capturapolizas_access.log combined
    Header always set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
    Header always set Pragma "no-cache"

    SSLEngine on
    SSLCertificateFile /home/bituaj/SSLSites/clickseguros.lat/clickseguros_lat.crt
    SSLCertificateKeyFile /home/bituaj/SSLSites/clickseguros.lat/clickseguros_lat.key

    <Directory /var/www/html/portal-captura-polizas>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://127.0.0.1:3001/api
    ProxyPassReverse /api http://127.0.0.1:3001/api
    ProxyPass /health http://127.0.0.1:3001/health
    ProxyPassReverse /health http://127.0.0.1:3001/health

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/api(?:\.php)?(?:/.*)?$ [NC]
    RewriteCond %{REQUEST_URI} !^/Catalogo_de_Ramo_y_SubRamo\.xlsx$ [NC]
    RewriteCond %{REQUEST_URI} !^/Catalogo_Grupos\.xlsx$ [NC]
    RewriteCond %{REQUEST_URI} !^/click-icon\.svg$ [NC]
    RewriteCond %{REQUEST_URI} !^/click-icon-20260718\.svg$ [NC]
    RewriteCond %{REQUEST_URI} !^/click-icon-20260719\.jpg$ [NC]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ /index.html [L]
</VirtualHost>
